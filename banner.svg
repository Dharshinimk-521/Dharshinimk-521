```svg
<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="400" fill="#0D1117"/>

  <!-- Gradient Accent -->
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Decorative circles -->
  <circle cx="1040" cy="90" r="90" fill="url(#accent)" opacity="0.08"/>
  <circle cx="1130" cy="300" r="140" fill="url(#accent)" opacity="0.06"/>

  <!-- Grid dots -->
  <g opacity="0.12">
    <circle cx="920" cy="80" r="2" fill="#58A6FF"/>
    <circle cx="950" cy="80" r="2" fill="#58A6FF"/>
    <circle cx="980" cy="80" r="2" fill="#58A6FF"/>

    <circle cx="920" cy="110" r="2" fill="#58A6FF"/>
    <circle cx="950" cy="110" r="2" fill="#58A6FF"/>
    <circle cx="980" cy="110" r="2" fill="#58A6FF"/>

    <circle cx="920" cy="140" r="2" fill="#58A6FF"/>
    <circle cx="950" cy="140" r="2" fill="#58A6FF"/>
    <circle cx="980" cy="140" r="2" fill="#58A6FF"/>
  </g>

  <!-- Name -->
  <text
    x="90"
    y="165"
    fill="#FFFFFF"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="56"
    font-weight="700">
    Hi 👋 I'm Dharshini M K
  </text>

  <!-- Role -->
  <text
    x="95"
    y="220"
